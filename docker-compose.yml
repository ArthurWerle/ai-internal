services:
  app:
    container_name: ai-internal
    build: .
    env_file:
      - stack.env
    environment:
      # Reach postgres over the compose network (service name + internal port),
      # not the host-published port. Overrides any DATABASE_URL from stack.env.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "3005:3005"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-internal-network
      - financer-transactions_transactions-network
      - bff_back-end
  postgres:
    image: postgres:16-alpine
    container_name: ai-internal-postgres
    env_file:
      - stack.env
    ports:
      - 5439:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-internal-network
volumes:
  postgres_data:

networks:
  ai-internal-network:
    driver: bridge
  financer-transactions_transactions-network:
    external: true
  bff_back-end:
    external: true