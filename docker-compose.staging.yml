services:
  app:
    container_name: ai-internal-staging
    build: .
    env_file:
      - stack.env
    environment:
      # Reach postgres over the compose network (service name + internal port),
      # not the host-published port. Overrides any DATABASE_URL from stack.env.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "3040:3005"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-internal-network
      # mcp-api-staging lives on this network. Staging must NOT join prod
      # networks (e.g. financer-transactions_transactions-network): the
      # "mcp-api" service alias exists in both environments, and on a shared
      # network Docker DNS round-robins between prod and staging containers,
      # silently splitting traffic across environments. Point MCP_API_URL at
      # the unique container name (http://mcp-api-staging:3006).
      - staging_bff_back-end
  postgres:
    image: postgres:16-alpine
    container_name: ai-internal-staging-postgres
    env_file:
      - stack.env
    ports:
      - 5440:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-internal-network
volumes:
  postgres_data:

networks:
  ai-internal-network:
    driver: bridge
  staging_bff_back-end:
    external: true