services:
  app:
    container_name: ai-internal-staging
    build: .
    ports:
      - "3040:3005"
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: ai-internal-staging-postgres
    env_file:
      - stack.env
    ports:
      - 5440:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
